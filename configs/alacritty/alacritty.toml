# =============================================================================
# alacritty.toml — Alacritty terminal configuration
# Docs: https://alacritty.org/config-alacritty.html
# =============================================================================

# ── Shell ─────────────────────────────────────────────────────────────────────
# macOS — uses default Zsh
[terminal]
#shell = { program = "/bin/zsh" }
#shell = { program = "wsl.exe", args = ["~"] }
shell = { program = "wsl.exe", args = ["-d", "Ubuntu", "--cd", "~"] }


# Windows — uncomment this block and comment out the macOS one above:
# [terminal]
# shell = { program = "wsl.exe", args = ["~"] }

# ── Window ────────────────────────────────────────────────────────────────────
[window]
padding = { x = 12, y = 10 }
decorations = "buttonless"        # macOS: removes title bar chrome
opacity = 0.95                    # subtle transparency
blur = true                       # macOS Sonoma+: blurs content behind window
startup_mode = "Maximized"

# ── Font ──────────────────────────────────────────────────────────────────────
# Requires JetBrainsMono Nerd Font — see README Step 2
[font]
#normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
normal = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Regular" }
bold   = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMonoNL Nerd Font Mono", style = "Italic" }
size = 14.0

# ── Cursor ────────────────────────────────────────────────────────────────────
[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 750

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history = 10000

# ── Colors (Dracula theme) ────────────────────────────────────────────────────
[colors.primary]
background = "#282a36"
foreground = "#f8f8f2"

[colors.cursor]
text   = "#282a36"
cursor = "#f8f8f2"

[colors.normal]
black   = "#21222c"
red     = "#ff5555"
green   = "#50fa7b"
yellow  = "#f1fa8c"
blue    = "#bd93f9"
magenta = "#ff79c6"
cyan    = "#8be9fd"
white   = "#f8f8f2"

[colors.bright]
black   = "#6272a4"
red     = "#ff6e6e"
green   = "#69ff94"
yellow  = "#ffffa5"
blue    = "#d6acff"
magenta = "#ff92df"
cyan    = "#a4ffff"
white   = "#ffffff"

# ── Keybindings ───────────────────────────────────────────────────────────────
# Note: Zellij handles most window/pane management keybindings.
# These are Alacritty-level bindings only.
[[keyboard.bindings]]
key = "Return"
mods = "Command|Shift"
action = "SpawnNewInstance"   # macOS: Cmd+Shift+Enter opens a new Alacritty window
