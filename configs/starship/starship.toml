# =============================================================================
# starship.toml — Starship prompt configuration
# Docs: https://starship.rs/config/
#
# Prompt structure (single line):
# <directory> [branch] ❴+staged ~modified ?untracked -deleted !conflicts ⇡ahead ⇣behind❵ (venv) (node) (cloud)
# ▶
#
# Legend:
# <> = current directory (cyan)
# [] = git branch (magenta)
# ❴❵ = git status
#     + staged files ready to commit (yellow)
#     ~ modified files not staged (orange)
#     ? untracked new files (cyan)
#     - deleted files (orange)
#     ! merge conflicts (yellow)
#     ⇡ commits ahead of remote — always shown (green)
#     ⇣ commits behind remote — always shown (green)
# () = active environment — venv (orange), node (green), cloud (cyan)
# ▶  = green on success, yellow on error
# =============================================================================

command_timeout = 5000
add_newline = true

format = """
[<](white)$directory[>](white) \
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$aws\
$gcloud\
$azure\
$cmd_duration\
$character"""

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bold cyan"
truncation_length = 5
truncate_to_repo = true
read_only = " 󰌾"
format = "[$path]($style)[$read_only]($read_only_style)"

# ── Git branch ────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold magenta"
format = "[\\[](white)[$symbol$branch]($style)[\\]](white) "

# ── Git status ────────────────────────────────────────────────────────────────
[git_status]
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = "⇡0 ⇣0"
staged = "+$count "
modified = "~$count "
untracked = "?$count "
deleted = "-$count "
conflicted = "!$count "
format = "[❴](white)[${staged}](bold yellow)[${modified}](bold orange)[${untracked}](bold cyan)[${deleted}](bold orange)[${conflicted}](bold yellow)[$ahead_behind](bold green)[❵](white)"

# ── Python virtualenv ─────────────────────────────────────────────────────────
[python]
symbol = " "
style = "bold orange"
format = " [($symbol$virtualenv)]($style)"
detect_files = ["*.py", "pyproject.toml", "requirements.txt", ".python-version"]
detect_extensions = ["py"]

# ── Node.js ───────────────────────────────────────────────────────────────────
[nodejs]
symbol = " "
style = "bold green"
format = " [(${symbol}${version})]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]

# ── Rust ──────────────────────────────────────────────────────────────────────
[rust]
symbol = " "
style = "bold orange"
format = " [(${symbol}${version})]($style)"
detect_files = ["Cargo.toml"]

# ── AWS ───────────────────────────────────────────────────────────────────────
[aws]
symbol = " "
style = "bold yellow"
format = " [(${symbol}${profile}(${region}))]($style)"
disabled = false

# ── GCP ───────────────────────────────────────────────────────────────────────
[gcloud]
symbol = " "
style = "bold cyan"
format = " [(${symbol}${account}(${project}))]($style)"
disabled = false

# ── Azure ─────────────────────────────────────────────────────────────────────
[azure]
symbol = "󰠅 "
style = "bold cyan"
format = " [(${symbol}${subscription})]($style)"
disabled = false

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time = 3000
style = "bold yellow"
format = " [(${duration})]($style)"

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[▶](bold green)"
error_symbol = "[▶](bold yellow)"